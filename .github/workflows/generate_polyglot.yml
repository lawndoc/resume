name: "Generate Polyglot"

on:
  push:
    branches:
      - master
    paths:
      - "resume.tex"
      - "icons/**"
  workflow_dispatch:

jobs:
    build:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Install build dependencies
              run: |
                sudo apt-get update
                sudo apt-get install -y autoconf clang gettext liblocale-msgfmt-perl texlive-full

            - name: Set git config
              run: |
                git config --global user.name "GitHub Actions [bot]"
                git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"

            - name: Build Polyglot PDF
              run: |
                make release
                mv PDFGitPolyglot.pdf CJ_May_Resume.pdf

            - name: Get current date
              id: date
              run: echo "::set-output name=DATE::$(date +'%Y-%m-%d')"
            
            - name: Create release
              uses: ncipollo/release-action@v1
              with:
                artifacts: "CJ_May_Resume.pdf"
                token: ${{ secrets.GITHUB_TOKEN }}
                tag: ${{ steps.date.outputs.DATE }}
                name: "CJ May Resume"
                body: "Automatically generated PDF from resume.tex"
                draft: false
                prerelease: false
